name: Action smoke

# End-to-end test of the composite action itself: spin up a real
# Weaviate cluster (weaviate-local-k8s, the same tool downstream users
# would use locally) with text2vec-model2vec, then invoke `uses: ./action`
# from within this workflow.
#
# This catches contract issues that the Python unit + integration suites
# can't see (a missing input in action.yml, a typo in a `${{ github.* }}`
# expression, PYTHONPATH wiring, or a missing runtime dep that the dev/
# test env masks transitively).

on:
  pull_request:
    paths:
      - "action/**"
      - ".github/workflows/action-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "action/**"
      - ".github/workflows/action-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Spin up Weaviate + model2vec via the official weaviate-local-k8s
      # GitHub Action. This is the same tool downstream users would run
      # locally to host an internal cluster, so the smoke exercises a
      # realistic deployment shape.
      #
      # The `modules: text2vec-model2vec` input deploys a sibling
      # model2vec-inference pod and wires Weaviate's
      # MODEL2VEC_INFERENCE_API to it via in-cluster DNS.
      - name: Spin up Weaviate + model2vec
        uses: weaviate/weaviate-local-k8s@v2
        with:
          workers: "1"
          replicas: "1"
          weaviate-version: "1.37.3"
          modules: "text2vec-model2vec"
          observability: "false"

      - name: Verify Weaviate ready
        run: |
          curl -fsS http://localhost:8080/v1/.well-known/ready
          curl -fsS http://localhost:8080/v1/meta | python3 -c "
          import sys, json
          m = json.load(sys.stdin)
          modules = list(m.get('modules', {}).keys())
          print('version:', m.get('version'))
          print('modules:', modules)
          assert 'text2vec-model2vec' in modules, 'text2vec-model2vec module not loaded'
          "

      # === The action under test ===
      # Invoking via `uses: ./action` exercises action.yml end-to-end
      # exactly as a downstream caller would. Missing inputs, typos in
      # `${{ github.* }}` interpolation, broken PYTHONPATH wiring, or
      # un-declared transitive deps would surface here — NOT in unit /
      # integration tests.
      - name: Run Weaviate Test Reporter (the action under test)
        uses: ./action
        with:
          weaviate_url: http://localhost:8080
          weaviate_api_key: ""
          junit_path: action/tests/unit/fixtures/pytest_simple.xml
          job_name: action-smoke
          vectorizer: text2vec-model2vec
          # Inside the Kind cluster, Weaviate reaches model2vec via DNS
          # set up by weaviate-local-k8s. This URL is from Weaviate's
          # perspective inside the cluster — NOT from the runner host.
          model2vec_inference_url: http://model2vec-inference.weaviate.svc.cluster.local.:8080
          fail_on_error: "true"
          verbose: "true"

      - name: Verify TestRun + TestCases landed
        run: |
          set -e
          response=$(curl -fsS -X POST http://localhost:8080/v1/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ Aggregate { TestRun { meta { count } } TestCase { meta { count } } } }"}')
          echo "$response"
          run_count=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['Aggregate']['TestRun'][0]['meta']['count'])")
          case_count=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['Aggregate']['TestCase'][0]['meta']['count'])")
          echo "TestRun=$run_count  TestCase=$case_count"
          # pytest_simple.xml has 3 testcases -> 1 TestRun, 3 TestCases.
          if [ "$run_count" != "1" ]; then
            echo "::error::expected 1 TestRun, got $run_count" >&2
            exit 1
          fi
          if [ "$case_count" != "3" ]; then
            echo "::error::expected 3 TestCases, got $case_count" >&2
            exit 1
          fi

      - name: Verify named vectors are populated
        run: |
          set -e
          # The TestCase with a stack trace must have all three named
          # vectors. Passed / skipped cases without a stack_trace only
          # get the `name` slot — Weaviate skips empty sources.
          #
          # NB about the GraphQL shape: `_additional.vectors` is a struct
          # where each NAMED VECTOR is a separate FIELD. To fetch them
          # we must explicitly list each field name in the selection set:
          #   vectors { name error_message stack_trace }
          # NOT `vectors { name }` (which would request only the `name`
          # slot's vector array). Each field value is either a list of
          # floats (populated) or null (source property was empty).
          response=$(curl -fsS -X POST http://localhost:8080/v1/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ Get { TestCase(where: {path: [\"status\"], operator: Equal, valueText: \"failed\"}) { name _additional { vectors { name error_message stack_trace } } } } }"}')
          slots=$(echo "$response" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          objs = d['data']['Get']['TestCase']
          assert len(objs) == 1, f'expected 1 failed case, got {len(objs)}'
          vecs = objs[0]['_additional']['vectors']
          # Each slot field is null when its source property was empty.
          populated = sorted(k for k, v in vecs.items() if v)
          print(','.join(populated))
          ")
          echo "populated named vectors on the failed case: $slots"
          if [ "$slots" != "error_message,name,stack_trace" ]; then
            echo "::error::expected all three named vectors on the failed case, got $slots" >&2
            exit 1
          fi

      - name: Re-run the action (idempotency check)
        uses: ./action
        with:
          weaviate_url: http://localhost:8080
          junit_path: action/tests/unit/fixtures/pytest_simple.xml
          job_name: action-smoke
          vectorizer: text2vec-model2vec
          model2vec_inference_url: http://model2vec-inference.weaviate.svc.cluster.local.:8080
          fail_on_error: "true"

      - name: Verify counts did NOT double after re-run
        run: |
          response=$(curl -fsS -X POST http://localhost:8080/v1/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ Aggregate { TestRun { meta { count } } TestCase { meta { count } } } }"}')
          run_count=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['Aggregate']['TestRun'][0]['meta']['count'])")
          case_count=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['Aggregate']['TestCase'][0]['meta']['count'])")
          if [ "$run_count" != "1" ] || [ "$case_count" != "3" ]; then
            echo "::error::idempotency violated — after re-run got TestRun=$run_count TestCase=$case_count" >&2
            exit 1
          fi
          echo "idempotency check passed"
