name: Build & publish frontend image

# Builds the dashboard container and publishes it to two registries:
#   - GHCR (ghcr.io) — the repo's own package
#   - Google Artifact Registry — the registry the deployment pulls from
#     (GHCR packages can't be made public in this org, so the image is pushed
#     to AR directly rather than proxying GHCR)
# There is NO deploy step here — only image publishing. The image reads its
# config (WEAVIATE_URL / WEAVIATE_API_KEY) from runtime env, so it bakes no
# secrets. Where/how the image is deployed is handled separately, outside
# this repo.
#
# Required repo config for the Artifact Registry push:
#   vars:    GCP_REGION, GCP_PROJECT_ID, AR_REPOSITORY
#   secret:  GCP_AR_SA_KEY  — JSON key of a service account scoped to ONLY
#            roles/artifactregistry.writer (push images; no deploy permissions)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR via the built-in GITHUB_TOKEN

concurrency:
  group: frontend-image
  # Don't cancel in-flight builds: every commit's immutable <sha> image must
  # publish (deploys pin a specific image by <sha>).
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      # ghcr.io/weaviate/weaviate-test-reporter/frontend
      GHCR_IMAGE: ghcr.io/${{ github.repository }}/frontend
      # <region>-docker.pkg.dev/<project>/<repo>/frontend
      AR_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_AR_SA_KEY }}

      - name: Compute image tags
        id: tags
        run: |
          # Publish an immutable <sha> tag to BOTH registries (lets a deploy
          # pin an exact commit). Move :latest (the deploy pointer) ONLY for
          # main, so a workflow_dispatch from a feature branch can't overwrite
          # it with unmerged code.
          tags="${GHCR_IMAGE}:${GITHUB_SHA},${AR_IMAGE}:${GITHUB_SHA}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${GHCR_IMAGE}:latest,${AR_IMAGE}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          push: true
          # One build, pushed to every tag above (both registries).
          tags: ${{ steps.tags.outputs.tags }}
          # Connects the GHCR package to this repository.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
