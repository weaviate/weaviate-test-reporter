name: Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # Unit tests (Vitest/Jest). Pure Node — no Weaviate or browser needed.
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # Playwright E2E suite. Spins up Weaviate + model2vec via docker compose,
  # seeds the cluster with the same script developers use locally, then
  # runs Playwright against the dev server.
  e2e:
    runs-on: ubuntu-latest
    services:
      weaviate:
        image: semitechnologies/weaviate:1.37.3
        ports:
          - 8080:8080
          - 50051:50051
        env:
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: /var/lib/weaviate
          DEFAULT_VECTORIZER_MODULE: none
          ENABLE_MODULES: text2vec-model2vec
          MODEL2VEC_INFERENCE_API: http://model2vec:8080
          CLUSTER_HOSTNAME: node1
      model2vec:
        image: semitechnologies/model2vec-inference:minishlab-potion-retrieval-32M
        ports:
          - 8012:8080
    steps:
      - uses: actions/checkout@v4

      # ---------- Python: seed the cluster ----------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: action/requirements-dev.txt

      - name: Install action package + deps
        working-directory: action
        run: pip install --requirement requirements-dev.txt

      - name: Wait for Weaviate to become ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/v1/.well-known/ready; then
              echo "weaviate ready"
              exit 0
            fi
            sleep 2
          done
          echo "weaviate did not become ready in 120s" >&2
          curl -v http://localhost:8080/v1/meta || true
          exit 1

      - name: Seed Weaviate with synthetic CI history
        working-directory: action
        env:
          # model2vec is reachable from the runner at localhost:8012,
          # but Weaviate itself reaches it via the Docker network alias
          # "model2vec" on port 8080 (set via the service env above).
          # The seed script's default is the in-cluster Kubernetes DNS;
          # for Actions services we override.
          PYTHONPATH: src
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, 'src')
          import scripts.seed_local as s
          s.MODEL2VEC_IN_CLUSTER = 'http://model2vec:8080'
          sys.exit(s.main())
          "

      # ---------- Node: build + Playwright ----------
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          WEAVIATE_URL: http://localhost:8080
          WEAVIATE_API_KEY: ""
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
