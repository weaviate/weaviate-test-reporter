name: Weaviate Test Reporter
description: Parse JUnit XML reports from CI and ingest them into Weaviate for semantic search and dashboards.
author: jfrancoa
branding:
  icon: bar-chart-2
  color: green

inputs:
  weaviate_url:
    description: Weaviate cluster URL. WCD (https://...) or local (http://host:port).
    required: true
  weaviate_api_key:
    description: API key with write access. Empty for anonymous self-hosted instances.
    required: false
    default: ""
  junit_path:
    description: Glob for JUnit XML files (e.g., "reports/*.xml" or "**/junit-*.xml").
    required: true
  job_name:
    description: Logical job name stored on TestRun (e.g., "e2e-backup"). Surfaced in the dashboard.
    required: true
  fail_on_error:
    description: If "true", exit non-zero when ingestion fails. Default false (fail-safe — never breaks user CI).
    required: false
    default: "false"
  vectorizer:
    description: |
      Weaviate vectorizer for the TestCase collection. Accepted values:
      `text2vec-weaviate` (default; Weaviate Embeddings, no extra setup on WCD),
      `text2vec-model2vec` (self-hosted; requires `model2vec_inference_url`),
      or `none` (no vectorization — filtering / aggregation only).
      Only applied when the TestCase collection is first created; existing
      collections are left untouched.
    required: false
    default: "text2vec-weaviate"
  model2vec_inference_url:
    description: |
      Inference URL for `text2vec-model2vec` from the Weaviate cluster's
      perspective (e.g., `http://model2vec-inference:8080` in-cluster).
      Required when `vectorizer = text2vec-model2vec`.
    required: false
    default: ""
  verbose:
    description: If "true", emit verbose pip and runtime logs. Default false.
    required: false
    default: "false"
  version_under_test:
    description: |
      Optional SemVer 2.0 string identifying the artifact under test —
      typically the raw image tag including any pre-release / build
      metadata (e.g. `1.38.1-rfea1de`, `1.36.14-3b58915`,
      `1.38.0-dev-9479337`). Accepts an optional `v`/`V` prefix.
      When set, the action populates THREE derived slots on `TestRun`:
        - `version_full` — verbatim SemVer string (the build-unique
          identifier used for dedup queries: "did we already report
          this build?")
        - `version_patch` — canonical `MAJOR.MINOR.PATCH` with the
          pre-release suffix dropped (e.g. `1.38.1`)
        - `version_minor` — `MAJOR.MINOR` (e.g. `1.38`)
      A non-empty value MUST parse as SemVer 2.0. If it doesn't (e.g.
      a branch name like `preview-correct-raft-replication-531de22`
      or the unresolved `latest_release` placeholder), the action
      exits non-zero at startup with a clear ConfigError —
      strict-by-default so misconfigured callers fail loudly instead
      of producing version-less TestRuns.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Resolve ${{ github.action_path }} to a canonical absolute path before
    # handing it to actions/setup-python. When this action is invoked
    # locally via `uses: ./action` (the action-smoke workflow + any fork
    # testing in-place), action_path resolves to `${WORKSPACE}/./action`
    # with a literal `./` — and setup-python's cache-dependency-path
    # rejects any path containing `.` or `..` segments
    # ("Invalid pattern ... Relative pathing '.' and '..' is not allowed").
    # `cd ... && pwd` strips the segment in all invocation modes.
    - name: Resolve action paths
      id: action-paths
      shell: bash
      run: |
        abs=$(cd "${{ github.action_path }}" && pwd)
        echo "abs=${abs}" >> "$GITHUB_OUTPUT"
        echo "requirements=${abs}/requirements.txt" >> "$GITHUB_OUTPUT"
        echo "src=${abs}/src" >> "$GITHUB_OUTPUT"

    # No `cache: pip` here. setup-python's pip cache requires
    # `cache-dependency-path` to point INSIDE `github.workspace` (the
    # consumer repo's checkout); when this action is consumed via
    # `uses: weaviate/weaviate-test-reporter/action@v1`, its files live
    # at `_actions/weaviate/...` which is OUTSIDE the workspace, and the
    # cache step fails with:
    #   No file in <workspace> matched to [<absolute path>/requirements.txt
    #   or **/pyproject.toml], make sure you have checked out the target
    #   repository
    # The 6-dep install takes ~15s — small enough that skipping the
    # cache is the simpler fix than smuggling files into the workspace.
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      env:
        VERBOSE: ${{ inputs.verbose }}
        REQUIREMENTS: ${{ steps.action-paths.outputs.requirements }}
      run: |
        if [ "$VERBOSE" = "true" ]; then
          pip install --requirement "$REQUIREMENTS"
        else
          pip install --quiet --requirement "$REQUIREMENTS"
        fi

    - name: Run Weaviate Test Reporter
      shell: bash
      env:
        # User inputs
        WEAVIATE_URL: ${{ inputs.weaviate_url }}
        WEAVIATE_API_KEY: ${{ inputs.weaviate_api_key }}
        JUNIT_PATH: ${{ inputs.junit_path }}
        JOB_NAME: ${{ inputs.job_name }}
        FAIL_ON_ERROR: ${{ inputs.fail_on_error }}
        VECTORIZER: ${{ inputs.vectorizer }}
        MODEL2VEC_INFERENCE_URL: ${{ inputs.model2vec_inference_url }}
        VERBOSE: ${{ inputs.verbose }}
        VERSION_UNDER_TEST: ${{ inputs.version_under_test }}
        # GitHub Actions context (auto-populated; never set by the caller).
        GH_REPOSITORY: ${{ github.repository }}
        GH_RUN_ID: ${{ github.run_id }}
        GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        GH_WORKFLOW: ${{ github.workflow }}
        GH_REF: ${{ github.ref_name }}
        GH_SHA: ${{ github.sha }}
        GH_EVENT_NAME: ${{ github.event_name }}
        GH_PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_ACTOR: ${{ github.actor }}
        GH_SERVER_URL: ${{ github.server_url }}
        # PYTHONPATH so the src layout is importable without an editable install.
        # Use the resolved absolute path so this also works when the action is
        # invoked via `uses: ./action` (no `./` segment in the path).
        PYTHONPATH: ${{ steps.action-paths.outputs.src }}
      run: python -m weaviate_test_reporter
